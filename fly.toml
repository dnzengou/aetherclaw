app = "aetherclaw"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  STATIC_DIR = "/app/static"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "aetherclaw_data"
  destination = "/data"
  initial_size = "1gb"

[[mounts]]
  source = "aetherclaw_workspace"
  destination = "/workspace"
  initial_size = "1gb"

[[mounts]]
  source = "aetherclaw_config"
  destination = "/root/.aetherclaw"
  initial_size = "100mb"
