version: '3.8'

services:
  aetherclaw:
    build:
      context: .
      dockerfile: Dockerfile.multiarch
    image: aetherclaw/aetherclaw:latest
    container_name: aetherclaw-core
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - aetherclaw-data:/data
      - ./workspace:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - RUST_LOG=info
      - PERSISTENCE_PATH=/data/memory.db
      - WORKSPACE_PATH=/workspace
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8080
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - LLM_LOCAL_PATH=/models
      - LLM_DEFAULT_MODEL=phi-2-q4.gguf
    networks:
      - aetherclaw-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 16M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "/aetherclaw", "health", "check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Web UI served by Caddy for SSL termination
  caddy:
    image: caddy:2-alpine
    container_name: aetherclaw-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    networks:
      - aetherclaw-net
    depends_on:
      - aetherclaw

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: aetherclaw-metrics
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - aetherclaw-net
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: aetherclaw-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    networks:
      - aetherclaw-net
    profiles:
      - monitoring

volumes:
  aetherclaw-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:

networks:
  aetherclaw-net:
    driver: bridge
