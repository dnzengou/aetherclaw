services:
  aetherclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aetherclaw
    ports:
      - "8080:8080"
    volumes:
      - aetherclaw_data:/data
      - aetherclaw_workspace:/workspace
      - aetherclaw_config:/root/.aetherclaw
    environment:
      RUST_LOG: info
      STATIC_DIR: /app/static
      # Set these via .env file or docker-compose override:
      # TELEGRAM_BOT_TOKEN: ""
      # OPENAI_API_KEY: ""
      # BRAVE_API_KEY: ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  aetherclaw_data:
  aetherclaw_workspace:
  aetherclaw_config:
