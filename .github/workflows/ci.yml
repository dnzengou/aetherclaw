name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ──────────────────────────────────────────────────────────
# Job 1: Frontend lint + build
# ──────────────────────────────────────────────────────────
jobs:
  frontend:
    name: Frontend (TypeScript + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci --prefer-offline
        working-directory: app

      - name: Type-check + build
        run: npm run build
        working-directory: app

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/dist/
          retention-days: 1

# ──────────────────────────────────────────────────────────
# Job 2: Rust check + test
# ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aetherclaw

      - name: Check
        run: cargo check --all-targets
        working-directory: aetherclaw

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: aetherclaw

      - name: Test
        run: cargo test
        working-directory: aetherclaw

# ──────────────────────────────────────────────────────────
# Job 3: Docker build → push to GHCR (main branch only)
# ──────────────────────────────────────────────────────────
  docker:
    name: Docker (GHCR)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ──────────────────────────────────────────────────────────
# Job 4: Deploy to Fly.io (requires FLY_API_TOKEN secret)
# ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Fly.io)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --remote-only --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
